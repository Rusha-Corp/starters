# Rusha system manifest — checked into the repo root.
# Rusha reads this file on every deploy to understand what to build and where.
#
# metadata is injected by Rusha at provisioning time — do not edit manually.
apiVersion: rusha.io/v1
kind: System
metadata:
  name: "{{ .SystemAlias }}"
  project: "{{ .ProjectAlias }}"
  org: "{{ .OrgAlias }}"
spec:
  template: react-fastapi-postgres
  services:
    - name: ui
      type: static
      internetFacing: true
      vcs:
        buildCommand: "npm run build"
        buildDir: "ui/dist"

    - name: api
      type: server
      port: 8000
      internetFacing: true
      healthCheck:
        path: /health/live
        intervalSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
      vcs:
        dockerfile: api/Dockerfile

    - name: db
      type: stateful
      port: 5432
      image: postgres:16
      storage: 20Gi
      healthCheck:
        command: ["pg_isready", "-U", "rusha"]
        intervalSeconds: 10
        timeoutSeconds: 5

  environment:
    - key: LOG_LEVEL
      value: INFO
    - key: LOG_FORMAT
      value: text
    - key: METRICS_ENABLED
      value: "true"
